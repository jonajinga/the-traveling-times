<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Pansy: 5 petals arranged around a center, violet/purple with yellow center -->

  <!-- Top petal -->
  <ellipse cx="16" cy="8" rx="5" ry="7.5" fill="#7B2FBE" transform="rotate(0, 16, 16)"/>
  <!-- Upper-right petal -->
  <ellipse cx="16" cy="8" rx="5" ry="7.5" fill="#9B4DE0" transform="rotate(72, 16, 16)"/>
  <!-- Lower-right petal -->
  <ellipse cx="16" cy="8" rx="5" ry="7.5" fill="#6A1B9A" transform="rotate(144, 16, 16)"/>
  <!-- Lower-left petal -->
  <ellipse cx="16" cy="8" rx="5" ry="7.5" fill="#6A1B9A" transform="rotate(216, 16, 16)"/>
  <!-- Upper-left petal -->
  <ellipse cx="16" cy="8" rx="5" ry="7.5" fill="#9B4DE0" transform="rotate(288, 16, 16)"/>

  <!-- Dark "face" markings on lower petals -->
  <ellipse cx="16" cy="8" rx="2" ry="4" fill="#4A0072" opacity="0.5" transform="rotate(144, 16, 16)"/>
  <ellipse cx="16" cy="8" rx="2" ry="4" fill="#4A0072" opacity="0.5" transform="rotate(216, 16, 16)"/>

  <!-- Yellow center -->
  <circle cx="16" cy="16" r="3.5" fill="#F9A825"/>
  <circle cx="16" cy="16" r="2" fill="#F57F17"/>
</svg>
